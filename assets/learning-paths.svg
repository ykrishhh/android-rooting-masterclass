<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="monospace">
  <rect width="800" height="350" fill="#0a0a0f"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#e8e8ed" font-size="18" font-weight="bold">Learning Paths</text>
  
  <!-- Path A: Frida -->
  <rect x="30" y="60" width="240" height="260" rx="10" fill="#0a1a0a" stroke="#6bcb77" stroke-width="2"/>
  <text x="150" y="85" text-anchor="middle" fill="#6bcb77" font-size="14" font-weight="bold">Path A: Quick Hook</text>
  <text x="150" y="105" text-anchor="middle" fill="#6bcb77" font-size="10">Frida — 5 minutes</text>
  
  <rect x="60" y="120" width="180" height="30" rx="4" fill="#6bcb77" opacity="0.15"/>
  <text x="150" y="140" text-anchor="middle" fill="#6bcb77" font-size="11">pip install frida-tools</text>
  
  <line x1="150" y1="155" x2="150" y2="170" stroke="#6bcb77" stroke-width="1.5"/>
  
  <rect x="60" y="170" width="180" height="30" rx="4" fill="#6bcb77" opacity="0.15"/>
  <text x="150" y="190" text-anchor="middle" fill="#6bcb77" font-size="11">Write hook.js</text>
  
  <line x1="150" y1="205" x2="150" y2="220" stroke="#6bcb77" stroke-width="1.5"/>
  
  <rect x="60" y="220" width="180" height="30" rx="4" fill="#6bcb77" opacity="0.15"/>
  <text x="150" y="240" text-anchor="middle" fill="#6bcb77" font-size="11">frida -U -f app -l hook.js</text>
  
  <line x1="150" y1="255" x2="150" y2="270" stroke="#6bcb77" stroke-width="1.5"/>
  
  <rect x="60" y="270" width="180" height="30" rx="4" fill="#6bcb77" opacity="0.3"/>
  <text x="150" y="290" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Results!</text>
  
  <!-- Path B: LSPosed -->
  <rect x="290" y="60" width="220" height="260" rx="10" fill="#1a1a0a" stroke="#ffd93d" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" fill="#ffd93d" font-size="14" font-weight="bold">Path B: Persistent</text>
  <text x="400" y="105" text-anchor="middle" fill="#ffd93d" font-size="10">LSPosed — 30 minutes</text>
  
  <rect x="320" y="120" width="160" height="30" rx="4" fill="#ffd93d" opacity="0.15"/>
  <text x="400" y="140" text-anchor="middle" fill="#ffd93d" font-size="11">Root with Magisk</text>
  
  <line x1="400" y1="155" x2="400" y2="170" stroke="#ffd93d" stroke-width="1.5"/>
  
  <rect x="320" y="170" width="160" height="30" rx="4" fill="#ffd93d" opacity="0.15"/>
  <text x="400" y="190" text-anchor="middle" fill="#ffd93d" font-size="11">Install LSPosed</text>
  
  <line x1="400" y1="205" x2="400" y2="220" stroke="#ffd93d" stroke-width="1.5"/>
  
  <rect x="320" y="220" width="160" height="30" rx="4" fill="#ffd93d" opacity="0.15"/>
  <text x="400" y="240" text-anchor="middle" fill="#ffd93d" font-size="11">Write Java module</text>
  
  <line x1="400" y1="255" x2="400" y2="270" stroke="#ffd93d" stroke-width="1.5"/>
  
  <rect x="320" y="270" width="160" height="30" rx="4" fill="#ffd93d" opacity="0.3"/>
  <text x="400" y="290" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Survives Reboot!</text>
  
  <!-- Path C: Kernel -->
  <rect x="540" y="60" width="230" height="260" rx="10" fill="#1a0a0a" stroke="#ff6b6b" stroke-width="2"/>
  <text x="655" y="85" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Path C: Kernel</text>
  <text x="655" y="105" text-anchor="middle" fill="#ff6b6b" font-size="10">KernelPatch — 2+ hours</text>
  
  <rect x="570" y="120" width="170" height="30" rx="4" fill="#ff6b6b" opacity="0.15"/>
  <text x="655" y="140" text-anchor="middle" fill="#ff6b6b" font-size="11">Unlock bootloader</text>
  
  <line x1="655" y1="155" x2="655" y2="170" stroke="#ff6b6b" stroke-width="1.5"/>
  
  <rect x="570" y="170" width="170" height="30" rx="4" fill="#ff6b6b" opacity="0.15"/>
  <text x="655" y="190" text-anchor="middle" fill="#ff6b6b" font-size="11">Install APatch</text>
  
  <line x1="655" y1="205" x2="655" y2="220" stroke="#ff6b6b" stroke-width="1.5"/>
  
  <rect x="570" y="220" width="170" height="30" rx="4" fill="#ff6b6b" opacity="0.15"/>
  <text x="655" y="240" text-anchor="middle" fill="#ff6b6b" font-size="11">Write C kernel hooks</text>
  
  <line x1="655" y1="255" x2="655" y2="270" stroke="#ff6b6b" stroke-width="1.5"/>
  
  <rect x="570" y="270" width="170" height="30" rx="4" fill="#ff6b6b" opacity="0.3"/>
  <text x="655" y="290" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Own Everything</text>
</svg>
