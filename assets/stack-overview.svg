<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e8e8ed" font-size="20" font-weight="bold">Android Hooking Stack</text>
  
  <!-- Layer 4: Kernel -->
  <rect x="50" y="60" width="700" height="90" rx="10" fill="#1a0a0a" stroke="#ff6b6b" stroke-width="2"/>
  <text x="80" y="85" fill="#ff6b6b" font-size="14" font-weight="bold">LAYER 4: KERNEL</text>
  <rect x="80" y="95" width="180" height="40" rx="6" fill="#ff6b6b" opacity="0.2"/>
  <text x="170" y="120" text-anchor="middle" fill="#ff6b6b" font-size="12">KernelPatch</text>
  <rect x="290" y="95" width="180" height="40" rx="6" fill="#ff6b6b" opacity="0.2"/>
  <text x="380" y="120" text-anchor="middle" fill="#ff6b6b" font-size="12">eBPF</text>
  <rect x="500" y="95" width="220" height="40" rx="6" fill="#ff6b6b" opacity="0.2"/>
  <text x="610" y="120" text-anchor="middle" fill="#ff6b6b" font-size="12">SELinux Hook</text>
  
  <!-- Layer 3: Framework -->
  <rect x="50" y="170" width="700" height="90" rx="10" fill="#1a1a0a" stroke="#ffd93d" stroke-width="2"/>
  <text x="80" y="195" fill="#ffd93d" font-size="14" font-weight="bold">LAYER 3: FRAMEWORK</text>
  <rect x="80" y="205" width="200" height="40" rx="6" fill="#ffd93d" opacity="0.2"/>
  <text x="180" y="230" text-anchor="middle" fill="#ffd93d" font-size="12">LSPosed / Xposed</text>
  <rect x="310" y="205" width="200" height="40" rx="6" fill="#ffd93d" opacity="0.2"/>
  <text x="410" y="230" text-anchor="middle" fill="#ffd93d" font-size="12">Shell Injection</text>
  <rect x="540" y="205" width="190" height="40" rx="6" fill="#ffd93d" opacity="0.2"/>
  <text x="635" y="230" text-anchor="middle" fill="#ffd93d" font-size="12">zygisk</text>
  
  <!-- Layer 2: Runtime -->
  <rect x="50" y="280" width="700" height="90" rx="10" fill="#0a1a0a" stroke="#6bcb77" stroke-width="2"/>
  <text x="80" y="305" fill="#6bcb77" font-size="14" font-weight="bold">LAYER 2: RUNTIME</text>
  <rect x="80" y="315" width="200" height="40" rx="6" fill="#6bcb77" opacity="0.2"/>
  <text x="180" y="340" text-anchor="middle" fill="#6bcb77" font-size="12">Frida</text>
  <rect x="310" y="315" width="200" height="40" rx="6" fill="#6bcb77" opacity="0.2"/>
  <text x="410" y="340" text-anchor="middle" fill="#6bcb77" font-size="12">DexEditor</text>
  <rect x="540" y="315" width="190" height="40" rx="6" fill="#6bcb77" opacity="0.2"/>
  <text x="635" y="340" text-anchor="middle" fill="#6bcb77" font-size="12">Native Hook</text>
  
  <!-- Layer 1: User-Space -->
  <rect x="50" y="390" width="700" height="90" rx="10" fill="#0a0a1a" stroke="#4d96ff" stroke-width="2"/>
  <text x="80" y="415" fill="#4d96ff" font-size="14" font-weight="bold">LAYER 1: USER-SPACE</text>
  <rect x="80" y="425" width="200" height="40" rx="6" fill="#4d96ff" opacity="0.2"/>
  <text x="180" y="450" text-anchor="middle" fill="#4d96ff" font-size="12">APK Decompilation</text>
  <rect x="310" y="425" width="200" height="40" rx="6" fill="#4d96ff" opacity="0.2"/>
  <text x="410" y="450" text-anchor="middle" fill="#4d96ff" font-size="12">Smali Editing</text>
  <rect x="540" y="425" width="190" height="40" rx="6" fill="#4d96ff" opacity="0.2"/>
  <text x="635" y="450" text-anchor="middle" fill="#4d96ff" font-size="12">DEX Format</text>
  
  <!-- Arrows -->
  <line x1="400" y1="150" x2="400" y2="170" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="260" x2="400" y2="280" stroke="#888" stroke-width="2"/>
  <line x1="400" y1="370" x2="400" y2="390" stroke="#888" stroke-width="2"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
</svg>
